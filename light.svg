    <circle cx="44" cy="24" r="6" fill="#F59E0B" opacity="0.8"/>
    <circle cx="64" cy="24" r="6" fill="#10B981" opacity="0.8"/>
    <text x="212" y="28" fill="#475569" font-size="12" text-anchor="middle" class="font-mono">avatar.sh</text>
    <line x1="0" y1="48" x2="424" y2="48" stroke="rgba(15,23,42,0.05)" stroke-width="1"/>

    <!-- ASCII PORTRAIT -->
    <g transform="translate(40, 100)" fill="url(#ascii-grad)" font-size="10" class="font-mono">
      <animateTransform attributeName="transform" type="translate" values="40,100; 40,95; 40,100" dur="6s" repeatCount="indefinite"/>
      <text>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,...............................</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,..,,,,,,,,,,,,,,,,,,,,,,,,,,,,.......</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,.........,,,,...,,,,,,,,,,,..........</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,,,,,,,,...,,,,...............</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,,,,,,,,......................</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,,,,,,,,,,,,......,,,..,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,,,,,:::::,,,,,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,,:+?%%S%%%?;,,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,:?SSS######%;,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,+SS%%**?%S#%:,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,;%++*;+?%*?%:,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,:::,::::::::::,:+;+*+*?**++,,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,,:;;;;+?++*:,,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,,,;;++*%?%*,,,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,,,,**+*?%%*:,,,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,,,,,;;+*++*?%%S%+:,,,,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,,,:;+?S%?????SSSSSSS?;:,,,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,,,,,,:*??SS%???%%%SS%%SSSS%%*;,,,,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">::::,:::,:*%?%S%%%??%%%%%??%%%S%SS%*,,,,:,,:,</tspan>
        <tspan x="0" dy="1.2em">:::::::,:*%S%S%?%%?%%?%%??*??%%%SSSS+,,,::,::</tspan>
        <tspan x="0" dy="1.2em">::::::::*?%SSS???%%S%%%???***S%SS%SS%;::::;;;</tspan>
        <tspan x="0" dy="1.2em">:::::::+?%?%SS???%%S%%%????**SS#%#S%#+:::::::</tspan>
        <tspan x="0" dy="1.2em">::::::+?%%?S#%**?%S%%%%????**#####%S#*;::,,,,</tspan>
        <tspan x="0" dy="1.2em">:::::;%?%SS#@%**%S%??%%%%??*?####S#SS+,,,,,,,</tspan>
        <tspan x="0" dy="1.2em">,,,,,+S%%S###?*?%%%%%%S%???*S@@SSSSSS+,,,,,,:</tspan>
        <tspan x="0" dy="1.2em">,,,,,*SSS##*?**?%%%%%S%?????###SS%%SS+,::::::</tspan>
        <tspan x="0" dy="1.2em">::::;??%S#@++??%%%%%%%????%S####SSSSS;,::::::</tspan>
        <tspan x="0" dy="1.2em">*+*%?%??%##SS?%%%?%%%%??%S%S#@#SS%S#%::::::::</tspan>
        <tspan x="0" dy="1.2em">#%+*%%%***%#SS?%%%%%%%%%%SS@@#%?%S##?::::::::</tspan>
        <tspan x="0" dy="1.2em">S%**S##+::;%SS%?%%%%S%%%S##%**?%S##%+;,,,,,,:</tspan>
        <tspan x="0" dy="1.2em">%??%#@@#+:;+S%%?%%SSS%%SS%+;;;+%###?+*;+??+*%</tspan>
        <tspan x="0" dy="1.2em">SSS##@@#%;:;*SS%%S#SSS%*;;;+*?S#@##@#S?%S*?S%</tspan>
        <tspan x="0" dy="1.2em">#######%S%;;;+?%%##%*+:::;?%SS##@#SS#SSSS%SS%</tspan>
        <tspan x="0" dy="1.2em">######S??%+::;;*SS+:;;++;?##S###@#%%%SSS?*SS%</tspan>
      </text>
      <!-- Scanline -->
      <line x1="-20" y1="0" x2="384" y2="0" stroke="rgba(6, 182, 212, 0.3)" stroke-width="2" filter="url(#glow)">
        <animate attributeName="y1" values="0; 400; 0" dur="4s" repeatCount="indefinite" />
        <animate attributeName="y2" values="0; 400; 0" dur="4s" repeatCount="indefinite" />
      </line>
    </g>

    <!-- Terminal Prompt -->
