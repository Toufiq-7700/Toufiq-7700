    <text x="52" y="520" fill="#06B6D4" font-size="14" class="font-mono">~</text>
    <text x="68" y="520" fill="#0F172A" font-size="14" class="font-mono">./initialize.sh<animate attributeName="opacity" values="0;1;1;0;0" dur="2s" repeatCount="indefinite" /></text>
